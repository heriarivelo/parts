<div class="h-screen flex overflow-hidden">
  <!-- Sidebar admin / manager -->
  <app-admin-sidebar (collapsedChange)="onSidebarCollapsedChange($event)">
  </app-admin-sidebar>

  <!-- Contenu principal -->
  <main class="h-full flex flex-col flex-1 min-w-0 overflow-hidden transition-all duration-300">
    <nav
      class="flex-shrink-0 bg-white/95 backdrop-blur border-b border-gray-100 shadow-sm px-8 py-3 flex justify-between items-center z-10">
      <div class="px-4">
        <h1 class="text-xl md:text-2xl font-bold text-gray-800">
            {{ pageTitle }}
          </h1>
      </div>

      <div #profileMenuContainer class="relative">
        <button type="button" (click)="toggleProfileMenu($event)"
          class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-100 transition">
          <div class="h-9 w-9 rounded-full bg-red-600 text-white flex items-center justify-center font-bold uppercase">
            {{ user?.name?.[0] || 'U' }}
          </div>

          <div class="hidden sm:block text-left">
            <div class="text-sm font-semibold text-gray-800 capitalize">
              {{ user?.name || 'Utilisateur' }}
            </div>
            <div class="text-xs text-gray-500">
              {{ getRoleLabel() }}
            </div>
          </div>

          <i class="fa-solid fa-chevron-down text-primary text-sm"></i>
        </button>

        <div *ngIf="showProfileMenu"
          class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-xl border border-gray-100 py-2 z-50 animate-fade-in">
          <div class="px-4 py-2 border-b border-gray-100">
            <p class="text-sm font-semibold text-gray-800">{{ user?.name || 'Utilisateur' }}</p>
            <p class="text-xs text-gray-500">{{ user?.email || '-' }}</p>
          </div>

          <button type="button" routerLink="/profile"
            class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-red-500 flex items-center gap-2">
            <i class="fa-solid fa-user text-gray-500"></i>
            Mon profil
          </button>

          <button *ngIf="isAdmin()" (click)="toggleParamMenu()"
            class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-red-500 flex items-center gap-2">
            <i class="fa-solid fa-gear text-gray-500"></i>
            Paramètres
          </button>

          <button *ngIf="showParamMenu" (click)="clearDatabase()" [disabled]="loading"
            class="w-full text-left px-4 py-2 text-sm text-orange-600 hover:bg-orange-50 flex items-center gap-2">
            <i class="fa-solid fa-trash"></i>
            {{ loading ? 'Suppression...' : 'Supprimer toutes les données' }}
          </button>

          <button (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-red-500 flex items-center gap-2">
            <i class="fa-solid fa-arrow-right-from-bracket text-gray-500"></i>
            Déconnexion
          </button>
        </div>
      </div>
    </nav>
    <div class="flex-1 min-h-0 flex flex-col overflow-hidden">
      <router-outlet></router-outlet>
    </div>
    
  </main>
</div>
