<div class="relative">
  <input
    type="text"
    [ngModel]="value"
    (ngModelChange)="onInput($event)"
    [placeholder]="placeholder"
    class="border border-gray-500 rounded-lg pl-10 pr-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
  />

  <svg
    class="w-5 h-5 absolute left-3 top-2.5 text-gray-400"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
    />
  </svg>
</div>
