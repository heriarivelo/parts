<div class="px-6 py-4 flex items-center justify-between border-t border-gray-200 bg-white">
  <!-- Mobile Pagination -->
  <div class="flex-1 flex justify-between sm:hidden">
    <button
      type="button"
      (click)="changePage(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
    >
      Précédent
    </button>

    <button
      type="button"
      (click)="changePage(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
    >
      Suivant
    </button>
  </div>

  <!-- Desktop Pagination -->
  <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
    <div>
      <p class="text-sm text-gray-700">
        Affichage de <span class="font-medium">{{ startItem }}</span>
        à <span class="font-medium">{{ endItem }}</span>
        sur <span class="font-medium">{{ totalItems }}</span> résultats
      </p>
    </div>

    <div>
      <nav class="relative z-0 inline-flex rounded-lg shadow-sm -space-x-px" aria-label="Pagination">
        <button
          type="button"
          (click)="changePage(1)"
          [disabled]="currentPage === 1"
          class="relative inline-flex items-center px-3 py-2 rounded-l-lg border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          &laquo;
        </button>

        <button
          type="button"
          (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Précédent
        </button>

        <ng-container *ngFor="let page of getPageNumbers()">
          <button
            type="button"
            (click)="changePage(page)"
            [class.!bg-red-600]="page === currentPage"
            [class.text-white]="page === currentPage"
            [class.border-red-600]="page === currentPage"
            [class.hover:bg-red-700]="page === currentPage"
            [class.hover:bg-gray-50]="page !== currentPage"
            class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700 transition-all"
          >
            {{ page }}
          </button>
        </ng-container>

        <button
          type="button"
          (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Suivant
        </button>

        <button
          type="button"
          (click)="changePage(totalPages)"
          [disabled]="currentPage === totalPages"
          class="relative inline-flex items-center px-3 py-2 rounded-r-lg border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          &raquo;
        </button>
      </nav>
    </div>
  </div>
</div>
