<div class="relative w-full">
  <input 
    [type]="type" 
    [id]="id" 
    [value]="value"
    [disabled]="disabled"
    (input)="onInputChange($event)"
    (blur)="onTouch()"
    placeholder=" "
    class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-gray-900 bg-transparent rounded-xl border border-gray-500 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer disabled:bg-gray-50 disabled:text-gray-400" />
  
  <label 
    [for]="id" 
    class="absolute text-sm text-gray-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-0 bg-white px-2 peer-focus:px-2 peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 start-1 cursor-text peer-disabled:bg-transparent">
    {{ label }}
  </label>
</div>
