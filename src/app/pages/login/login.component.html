<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="absolute top-6 left-6">
    <a routerLink="/" class="inline-flex items-center gap-2 text-sm font-semibold text-gray-600 hover:text-primary">
      ← Retour à l’accueil
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h1 class="text-center text-3xl font-extrabold text-gray-600">
      <span class="text-primary">Kaleo</span>Parts
    </h1>

    <h2 class="mt-6 text-center text-2xl font-bold text-gray-800">
      Connexion à votre compte
    </h2>

    <p class="mt-2 text-center text-sm text-gray-600">
      Pas encore inscrit ?
      <a routerLink="/register" class="font-semibold text-primary hover:text-red-500">
        Créez un compte
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10 border border-gray-100">
      <form class="space-y-6" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700">
            Email *
          </label>

          <div class="mt-1">
            <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
              placeholder="exemple@email.com"
              class="appearance-none block w-full px-4 py-3 border border-gray-400 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm" />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700">
            Mot de passe *
          </label>

          <div class="mt-1 relative">
            <input id="password" name="password" [type]="showPassword ? 'text' : 'password'"
              autocomplete="current-password" required [(ngModel)]="password" placeholder="Votre mot de passe"
              class="appearance-none block w-full px-4 py-3 pr-12 border border-gray-400 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm" />

            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-primary">
              <i *ngIf="!showPassword" class="fa-solid fa-eye"></i>
              <i *ngIf="showPassword" class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <button type="button"
          className="text-sm font-medium text-[#2A5CAA] hover:text-[#2a4578] hover:underline mt-2 text-left">
          Mot de passe oublié ?
        </button>

        <div *ngIf="error" class="rounded-xl bg-red-50 p-4 border border-red-100">
          <div class="flex">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                fill="currentColor">
                <path fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                  clip-rule="evenodd" />
              </svg>
            </div>

            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">{{ error }}</h3>
            </div>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-primary hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition">
            <span *ngIf="!isLoading">Se connecter</span>

            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              Connexion...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
