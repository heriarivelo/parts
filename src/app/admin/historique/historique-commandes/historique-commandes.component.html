<div class="h-full w-full flex flex-col overflow-hidden p-6">

    <!-- Filtres -->
    <div class="flex flex-shrink-0 gap-4 mb-4 justify-end">
        <app-search-input placeholder="Rechercher par référence..." [(value)]="recherche" (search)="onSearch()">
        </app-search-input>
        <select
            [(ngModel)]="filtreStatut"
            (change)="onStatusFilterChange()"
            class="custom-select px-4 py-2 border border-gray-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
            <option value="">Tous les statuts</option>
            <option *ngFor="let statut of statuts" [value]="statut">
            {{ statut }}
            </option>
        </select>
    </div>

    <div class="flex-1 overflow-y-auto custom-sidebar-scroll">

        <!-- Loading State -->
        <div *ngIf="isLoading" class="flex justify-center my-8">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
        </div>

        <!-- Commandes Table -->
        <div *ngIf="!isLoading" class="overflow-x-auto bg-white rounded-lg shadow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50 font-semibold text-gray-700">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">
                            Référence
                        </th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">
                            Client</th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">
                            Manager</th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">Date
                        </th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">Total
                        </th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">
                            status
                        </th>
                        <th class="px-6 py-3 text-left text-xs uppercase tracking-wider">
                            Actions
                        </th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let commande of commandes" class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ commande.reference }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            {{ commande.customer?.nom || 'N/A' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" [title]="commande.manager.email">
                            {{ commande.manager?.name || 'N/A' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            {{ commande.createdAt | date:'medium' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            {{ commande.totalAmount | currency:'Ar' }}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            <span [ngClass]="getStatutColor(commande.status)"
                                class="text-xs font-bold px-2 py-1 rounded-full">
                                {{ commande.status }}</span>
                        </td>
                        <!-- Dans la ligne du tableau, ajoutez une colonne action -->
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button (click)="openOrderDetails(commande.id)"
                                class="h-9 w-9 bg-gray-200 text-gray-700 hover:bg-red-600 hover:text-white rounded-xl flex items-center justify-center transition"
                                title="Détails">
                                <i class="fa-solid fa-circle-info"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div *ngIf="pagination.totalCount > pagination.pageSize" class="flex-shrink-0 bg-white border-t">
        <!-- Pagination -->
        <app-admin-pagination [currentPage]="pagination.currentPage" [pageSize]="pagination.pageSize"
            [totalItems]="pagination.totalCount" (pageChange)="changePage($event)"></app-admin-pagination>
    </div>

</div>

<app-order-details [isOpen]="isOrderDetailsOpen" [orderId]="selectedOrderId"
    (close)="closeOrderDetails()"></app-order-details>
